---
layout: default
title: Projects
permalink: /projects/
---

<div class="projects-list">
  <div class="section-marker" style="margin-bottom: 30px">
    <span
      style="
        background: #f0efe9;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 0.8em;
        font-weight: 600;
        color: #555;
        letter-spacing: 1px;
      "
      >MY PROJECTS</span
    >
  </div>

  <div class="projects-feed" style="max-width: 100%; margin: 0 auto; font-family: 'Courier New', Courier, monospace;">
    {% assign project_posts = site.categories.projects %}
    {% if project_posts.size > 0 %}
      {% for post in project_posts %}
      <article class="project-full-content" style="margin-bottom: 60px; padding-bottom: 40px; border-bottom: 2px dashed #bbb;">
        <header style="margin-bottom: 25px; border: none !important;">
          <h1 style="margin-top: 0; line-height: 1.2; text-transform: uppercase; border-bottom: none !important;">
            <span style="
              background: #f0efe9;
              padding: 10px 20px;
              border-radius: 4px;
              font-size: 1.2em;
              font-weight: 700;
              color: #444;
              letter-spacing: 1px;
              display: inline-block;
              box-shadow: 
                inset 1px 1px 0px rgba(255,255,255,0.8),
                inset -1px -1px 0px rgba(0,0,0,0.1),
                2px 2px 5px rgba(0,0,0,0.15),
                1px 1px 0px rgba(0,0,0,0.1);
              border: 1px solid #d4d3cd;
              text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
            ">{{ post.title }}</span>
          </h1>
        </header>

      <div
        class="project-body"
        style="font-size: 1em; line-height: 1.6; color: #444"
      >
        {{ post.content }}
      </div>
    </article>
    {% endfor %} {% else %}
    <div style="padding: 50px; text-align: center; color: #999">
      <p>No projects to display yet.</p>
    </div>
    {% endif %}
  </div>

  <style>
    /* Specific styles for project content to override global blog styles */
    .project-full-content img {
      max-width: 100%;
      height: auto;
      max-height: 300px; /* Limit height to force "thumbnail" look for large images */
      object-fit: cover; /* Crop if necessary to fit the height constraint */
      object-position: top; /* Focus on the top part of the image */
      border: 1px solid #ccc;
      padding: 5px;
      background-color: #fff;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
      display: block;
      margin: 20px auto;
      cursor: zoom-in;
    }

    .project-full-content img:hover {
      transform: scale(1.02);
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.15);
      border-color: #999;
    }

    .project-body h2 {
      font-size: 1.4em;
      border-bottom: none;
      padding-bottom: 5px;
      margin-top: 30px;
      margin-bottom: 15px;
      color: #333;
    }

    .project-body ul {
      list-style-type: square;
      padding-left: 20px;
    }

    .project-body li {
      margin-bottom: 8px;
    }
  </style>
</div>
