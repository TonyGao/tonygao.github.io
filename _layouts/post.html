---
layout: default
---

<div class="paper-content">
  <article lang="en" class="post-article">
    <header
      class="post-header"
      style="
        margin-bottom: 40px;
        border-bottom: 1px dashed #ddd;
        padding-bottom: 20px;
      "
    >
      <h1 class="post-title" itemprop="name headline">{{ page.title }}</h1>
      <div
        class="post-meta"
        style="
          color: #666;
          font-family: monospace;
          font-size: 0.9em;
          margin-top: 10px;
        "
      >
        <time
          datetime="{{ page.date | date_to_xmlschema }}"
          itemprop="datePublished"
          >{{ page.date | date: "%-d %b %Y" }}</time
        >
        {% if page.author %} •
        <span itemprop="author" itemscope itemtype="http://schema.org/Person"
          ><span itemprop="name">{{ page.author }}</span></span
        >{% endif %}
      </div>
    </header>

    <div class="post-content" itemprop="articleBody">
      {% if page.abstract %}
      <div
        class="abstract"
        style="
          background: #f9f9f9;
          padding: 15px;
          border-left: 3px solid #ff6b35;
          margin-bottom: 30px;
          font-style: italic;
        "
      >
        <b>Abstract.</b> {{ page.abstract }}
      </div>
      {% endif %} {{ content }}
    </div>
  </article>
</div>
